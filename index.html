<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipidahterka</title>

    <style>
        @font-face {
            font-family: 'Spielarcade';
            src: url('assets/Spielarcade.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0b;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .hero {
            display: flex;
            align-items: center;
            gap: 60px;
            transform: translateY(-180px);
        }

        .content {
            text-align: center;
        }

        .glowing-text {
            font-family: 'Spielarcade', 'Segoe UI', sans-serif;
            font-size: 6.5rem;
            font-weight: normal;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow:
                0 0 7px #ffffff,
                0 0 10px #ffffff,
                0 0 21px #ffffff,
                0 0 42px #00f3ff,
                0 0 82px #00f3ff,
                0 0 92px #00f3ff,
                0 0 102px #00f3ff,
                0 0 151px #00f3ff;
            animation: pulse 2s infinite alternate;
        }

        .subtitle {
            margin-top: 25px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff1a1a;
            letter-spacing: 1px;
            text-shadow:
                0 0 7px #ff0000,
                0 0 15px #ff0000,
                0 0 30px #8b0000;
        }

        .funpay-link {
            display: block;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .funpay-logo {
            width: 260px;
            height: auto;
            border-radius: 14px;
            box-shadow:
                0 0 10px rgba(255, 255, 255, 0.5),
                0 0 25px rgba(49, 132, 214, 0.8),
                0 0 45px rgba(49, 132, 214, 0.6);
            transition: 0.3s ease;
        }

        .funpay-link:hover .funpay-logo {
            transform: scale(1.08);
            box-shadow:
                0 0 15px rgba(255, 255, 255, 0.8),
                0 0 35px rgba(49, 132, 214, 1),
                0 0 70px rgba(49, 132, 214, 0.9);
        }

        @keyframes pulse {
            from {
                text-shadow:
                    0 0 10px #ffffff,
                    0 0 20px #00f3ff,
                    0 0 40px #00f3ff,
                    0 0 80px #00f3ff;
            }

            to {
                text-shadow:
                    0 0 5px #ffffff,
                    0 0 10px #00f3ff,
                    0 0 20px #00f3ff,
                    0 0 60px #00f3ff;
                transform: scale(1.02);
            }
        }

        @media (max-width: 900px) {
            .hero {
                flex-direction: column;
                gap: 35px;
                transform: translateY(-90px);
            }

            .glowing-text {
                font-size: 3.8rem;
                letter-spacing: 3px;
            }

            .subtitle {
                font-size: 1.2rem;
            }

            .funpay-logo {
                width: 210px;
            }
        }
    </style>
</head>

<body>

    <div class="hero">
        <div class="content">
            <div class="glowing-text">Pipidahterka</div>
            <div class="subtitle">Become part of us – become stronger.</div>
        </div>

        <a class="funpay-link" href="https://funpay.com/users/13609498/" target="_blank" rel="noopener noreferrer">
            <img class="funpay-logo" src="assets/funpay.png" alt="FunPay">
        </a>
    </div>

</body>
</html>
