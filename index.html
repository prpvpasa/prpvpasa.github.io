<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipidahterka</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0b;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .hero {
            display: flex;
            align-items: center;
            gap: 55px;
            transform: translateY(-160px);
        }

        .content {
            text-align: center;
        }

        .glowing-text {
            font-size: 5.5rem;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 
                0 0 7px #fff,
                0 0 10px #fff,
                0 0 21px #fff,
                0 0 42px #00f3ff,
                0 0 82px #00f3ff,
                0 0 92px #00f3ff,
                0 0 102px #00f3ff,
                0 0 151px #00f3ff;
            animation: pulse 2s infinite alternate;
        }

        .subtitle {
            margin-top: 25px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff1a1a;
            letter-spacing: 1px;
            text-shadow:
                0 0 7px #ff0000,
                0 0 15px #ff0000,
                0 0 30px #8b0000;
        }

        .funpay-link {
            text-decoration: none;
        }

        .funpay-icon {
            width: 110px;
            height: 110px;
            border-radius: 24px;
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #111;
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: 1px;
            box-shadow:
                0 0 10px #ffcc00,
                0 0 25px #ff9900,
                0 0 45px rgba(255, 153, 0, 0.7);
            transition: 0.3s ease;
        }

        .funpay-icon:hover {
            transform: scale(1.1);
            box-shadow:
                0 0 15px #ffcc00,
                0 0 35px #ff9900,
                0 0 70px rgba(255, 153, 0, 0.9);
        }

        @keyframes pulse {
            from {
                text-shadow: 
                    0 0 10px #fff,
                    0 0 20px #00f3ff,
                    0 0 40px #00f3ff,
                    0 0 80px #00f3ff;
            }
            to {
                text-shadow: 
                    0 0 5px #fff,
                    0 0 10px #00f3ff,
                    0 0 20px #00f3ff,
                    0 0 60px #00f3ff;
                transform: scale(1.02);
            }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="content">
            <div class="glowing-text">Pipidahterka</div>
            <div class="subtitle">Become part of us – become stronger.</div>
        </div>

        <a class="funpay-link" href="https://funpay.com/users/13609498/" target="_blank">
            <div class="funpay-icon">FunPay</div>
        </a>
    </div>

</body>
</html>
